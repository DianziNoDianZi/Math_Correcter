{% extends 'admin_base.html' %}
{% block content %}
<div class="container mx-auto">
  <h1 class="text-2xl font-semibold mb-4">个性化设置</h1>
  
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="mb-4 p-3 rounded {% if category == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  
  <section class="bg-white rounded-lg shadow p-4">
    <form action="/admin/customization" method="POST" class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-semibold mb-1">背景类型</label>
        <select name="bg_type" class="border rounded w-full px-2 py-2">
          <option value="gradient" {% if customization.bg_type == 'gradient' %}selected{% endif %}>渐变背景</option>
          <option value="image" {% if customization.bg_type == 'image' %}selected{% endif %}>自定义图片</option>
        </select>
      </div>
<div>
        <label class="block text-sm font-semibold mb-1">背景图片文件名（放在 static/bg/ 目录）</label>
        <input type="text" name="bg_image" value="{{ customization.bg_image }}" class="border rounded w-full px-2 py-2" placeholder="background.jpg">
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">界面透明度 (0-100%)</label>
        <input type="range" name="opacity" value="{{ customization.opacity or 100 }}" min="0" max="100" class="w-full" oninput="this.nextElementSibling.value = this.value + '%'">
        <output>{{ customization.opacity or 100 }}%</output>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">结束颜色</label>
        <input type="color" name="bg_color2" value="{{ customization.bg_color2 }}" class="border rounded h-10 w-full">
      </div>
      <div class="md:col-span-2">
        <label class="block text-sm font-semibold mb-1">背景图片文件名（放在 static/bg/ 目录）</label>
        <input type="text" name="bg_image" value="{{ customization.bg_image }}" class="border rounded w-full px-2 py-2" placeholder="background.jpg">
      </div>
      <div class="flex items-end">
        <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">保存</button>
      </div>
    </form>
  </section>
</div>
{% endblock %}
