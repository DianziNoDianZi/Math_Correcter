<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    .toast { position: fixed; right: 1rem; top: 1rem; z-index: 9999; }
  </style>
</head>
<body class="text-gray-900" 
    {% if g.customization and g.customization.bg_type == 'image' and g.customization.bg_image %}
    style="background: url('/static/bg/{{ g.customization.bg_image }}') no-repeat center center fixed; background-size: cover; min-height:100vh;"
    {% elif g.customization %}
    style="background: linear-gradient(135deg, {{ g.customization.bg_color1 }} 0%, {{ g.customization.bg_color2 }} 100%); min-height:100vh;"
    {% else %}
    class="bg-gray-100 text-gray-900"
    {% endif %}>
  <div id="toast-container" class="toast"></div>
  <div class="min-h-screen flex">
    <aside class="w-64 bg-white border-r p-4">
      <div class="font-semibold text-xl mb-4">管理面板</div>
      <nav class="space-y-2 text-sm">
        <a href="/admin/dashboard" class="block py-2 px-3 rounded hover:bg-gray-100">仪表盘</a>
        <a href="/admin/models" class="block py-2 px-3 rounded hover:bg-gray-100">模型管理</a>
        <a href="/admin/customization" class="block py-2 px-3 rounded hover:bg-gray-100">个性化设置</a>
        <a href="/admin/tts" class="block py-2 px-3 rounded hover:bg-gray-100">TTS 设置</a>
        <a href="/admin/logs" class="block py-2 px-3 rounded hover:bg-gray-100">运行日志</a>
        <a href="/admin/ip" class="block py-2 px-3 rounded hover:bg-gray-100">IP管理</a>
        <a href="/admin/chat_test" class="block py-2 px-3 rounded hover:bg-gray-100">对话测试</a>
        <div class="border-t my-3"></div>
        <div class="text-xs text-gray-500 px-3 py-1">快速入口</div>
        <a href="/" class="block py-2 px-3 rounded hover:bg-blue-100 text-blue-600">📝 学生端</a>
        <a href="/teacher" class="block py-2 px-3 rounded hover:bg-green-100 text-green-600">🏫 教师端</a>
        <a href="/library" class="block py-2 px-3 rounded hover:bg-purple-100 text-purple-600">📚 试卷库</a>
        <a href="/student" class="block py-2 px-3 rounded hover:bg-indigo-100 text-indigo-600">👤 成绩查询</a>
        <div class="border-t my-3"></div>
        <a href="/admin/logout" class="block py-2 px-3 rounded hover:bg-gray-100 text-red-500">退出登录</a>
      </nav>
    </aside>
    <main class="flex-1 p-6" style="opacity: {{ (g.customization.opacity / 100) if g.customization and g.customization.opacity else 1 }};">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script>
    function showToast(message, duration = 4000) {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const div = document.createElement('div');
      div.textContent = message;
      div.style.background = '#333';
      div.style.color = '#fff';
      div.style.padding = '8px 12px';
      div.style.marginTop = '6px';
      div.style.borderRadius = '4px';
      div.style.boxShadow = '0 2px 6px rgba(0,0,0,.3)';
      div.style.opacity = '0';
      div.style.transition = 'opacity .3s';
      container.appendChild(div);
      requestAnimationFrame(() => { div.style.opacity = '1'; });
      setTimeout(() => {
        div.style.opacity = '0';
        setTimeout(() => div.remove(), 300);
      }, duration);
    }
  </script>
</body>
</html>
