<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学作业智能批改助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Markdown 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <script>
        window.MathJax = {
            loader: { load: ['input/tex', 'output/chtml'] },
            chtml: { fontURL: '/static/output/chtml/fonts/woff-v2' },
            startup: { typeset: false },
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script src="/static/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        /* Markdown 内容样式 */
        .result-content {
            line-height: 1.6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .result-content h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 1.25rem;
            margin-bottom: 0.75rem;
            color: #1f2937;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 0.5rem;
        }
        .result-content h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            color: #374151;
        }
        .result-content h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 0.75rem;
            margin-bottom: 0.5rem;
            color: #4b5563;
        }
        .result-content p {
            margin-bottom: 0.75rem;
            color: #374151;
        }
        .result-content ul, .result-content ol {
            margin-bottom: 0.75rem;
            padding-left: 1.5rem;
        }
        .result-content li {
            margin-bottom: 0.25rem;
            color: #374151;
        }
        .result-content code {
            background-color: #f3f4f6;
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            font-family: monospace;
            font-size: 0.9em;
        }
        .result-content pre {
            background-color: #f3f4f6;
            padding: 0.75rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-bottom: 0.75rem;
        }
        .result-content pre code {
            background: none;
            padding: 0;
        }
        .result-content blockquote {
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
            margin: 0.75rem 0;
            color: #6b7280;
        }
        .spinner {
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                padding: 0.5rem;
            }
            
            .w-full.max-w-4xl {
                padding: 1rem;
            }
            
            h1 {
                font-size: 1.75rem !important;
            }
            
            /* 模式选择 - 移动端垂直排列 */
            .flex.gap-4 {
                flex-direction: column;
                gap: 0.75rem;
            }
            
            .flex.gap-4 label {
                margin-bottom: 0;
            }
            
            /* 按钮 - 移动端全宽 */
            #uploadBtn, #queryBtn {
                width: 100%;
                margin-bottom: 0.5rem;
            }
            
            /* 查询码输入 */
            input[type="text"] {
                font-size: 16px;
            }
            
            /* 指导进度条 */
            .flex.gap-3 {
                flex-direction: column;
            }
            
            .flex.gap-3 button {
                width: 100%;
            }
            
            /* 结果显示区域 */
            .bg-gray-50 {
                padding: 1rem;
                font-size: 0.95rem;
            }
            
            /* 进度条标签 */
            #progressText {
                font-size: 0.75rem;
            }
            
            /* 触摸友好的按钮大小 */
            button {
                min-height: 44px;
                padding: 0.625rem 1rem;
            }
            
            /* 文件输入 */
            input[type="file"] {
                font-size: 16px;
            }
        }
        
        /* 超小屏幕 */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem !important;
            }
            
            .text-xl {
                font-size: 1.125rem;
            }
            
            .p-6 {
                padding: 0.75rem;
            }
            
            .text-2xl {
                font-size: 1.75rem;
            }
            
            .text-sm {
                font-size: 0.8rem;
            }
        }
        
        /* 触摸设备优化 */
        @media (hover: none) and (pointer: coarse) {
            button:hover {
                opacity: inherit;
            }
            
            button:active {
                opacity: 0.7;
                transform: scale(0.98);
            }
            
            .result-content {
                -webkit-overflow-scrolling: touch;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4"

    <script>
        const SERVER_URL = window.location.origin;
        let lastRequestTime = 0;
        const BUTTON_COOLDOWN = 5000;
        let latexDisplayMode = false;
        
        // 配置 marked，防止它错误处理 LaTeX
        marked.setOptions({
            breaks: true,
            gfm: true
        });
        
        // 临时保存 LaTeX 的函数
        function protectLatex(text) {
            const latexMap = new Map();
            let counter = 0;
            
            // 处理 $$...$$ 和 \[...\]
            text = text.replace(/(\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\])/g, (match) => {
                const key = `%%LATEX_DISPLAY_${counter}%%`;
                latexMap.set(key, match);
                counter++;
                return key;
            });
            
            // 处理 $...$ 和 \(...\)
            text = text.replace(/(\$[^\$]+\$|\\\([^\)]*\\\))/g, (match) => {
                const key = `%%LATEX_INLINE_${counter}%%`;
                latexMap.set(key, match);
                counter++;
                return key;
            });
            
            return { text, latexMap };
        }
        
        // 恢复 LaTeX 的函数
        function restoreLatex(text, latexMap) {
            latexMap.forEach((value, key) => {
                text = text.replace(key, value);
            });
            return text;
        }
        
        // 渲染 Markdown 并保留 LaTeX
        function renderMarkdownWithLatex(text) {
            if (!text) return '';
            
            // 保护 LaTeX
            const { text: protectedText, latexMap } = protectLatex(text);
            
            // 渲染 Markdown
            let html = marked.parse(protectedText);
            
            // 恢复 LaTeX
            html = restoreLatex(html, latexMap);
            
            return html;
        }
        
        async function renderLatex(element) {
            await waitForMathJax();
            if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
                try {
                    const html = element.innerHTML;
                    const hasDisplay = html.includes('$$') || html.includes('\\[');
                    latexDisplayMode = hasDisplay;
                    await MathJax.typesetPromise([element]);
                    console.log('LaTeX 渲染完成, mode:', hasDisplay ? '换行($$)' : '行内($)');
                } catch (err) {
                    console.warn('MathJax 渲染错误:', err);
                }
            }
        }
        function waitForMathJax(attempts = 0) {
            return new Promise((resolve) => {
                if (typeof MathJax !== 'undefined' && MathJax.startup) {
                    if (MathJax.startup.promise) {
                        MathJax.startup.promise.then(() => resolve()).catch(resolve);
                    } else {
                        resolve();
                    }
                } else if (attempts < 50) {
                    setTimeout(() => waitForMathJax(attempts + 1).then(resolve), 100);
                } else {
                    resolve();
                }
            });
        }
        document.addEventListener('DOMContentLoaded', function () {
            const imageInput = document.getElementById('imageInput');
            const uploadBtn = document.getElementById('uploadBtn');
            const uploadStatus = document.getElementById('uploadStatus');
            const queryCodeInput = document.getElementById('queryCodeInput');
            const copyCodeBtn = document.getElementById('copyCodeBtn');
            const queryBtn = document.getElementById('queryBtn');
            const queryStatus = document.getElementById('queryStatus');
            const quickResultDisplay = document.getElementById('quickResultDisplay');
            const guidedResultDisplay = document.getElementById('guidedResultDisplay');
            const hintContent = document.getElementById('hintContent');
            const hintActions = document.getElementById('hintActions');
            const nextHintBtn = document.getElementById('nextHintBtn');
            const showSolutionBtn = document.getElementById('showSolutionBtn');
            const hintProgressBar = document.getElementById('hintProgressBar');
            const hintProgressText = document.getElementById('hintProgressText');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressLabel = document.getElementById('progressLabel');
            const progressText = document.getElementById('progressText');
            const audioSection = document.getElementById('audioSection');
            const generateAudioBtn = document.getElementById('generateAudioBtn');
            const audioPlayer = document.getElementById('audioPlayer');
            
            let currentQueryCode = '';
            let hasAudio = false;
            let currentMode = 'quick';
            let currentHintStep = 0;
            let totalHintSteps = 4;
            let currentHints = [];
            
            // 进度条函数
            function showProgress(label, text, percent) {
                progressContainer.classList.remove('hidden');
                progressLabel.textContent = label;
                progressText.textContent = text;
                progressBar.style.width = `${percent}%`;
            }
            
            function hideProgress() {
                progressContainer.classList.add('hidden');
                progressBar.style.width = '0%';
            }
            
            // 更新指导进度条
            function updateHintProgress(step) {
                const percent = (step / totalHintSteps) * 100;
                hintProgressBar.style.width = `${percent}%`;
                hintProgressText.textContent = `步骤 ${step}/${totalHintSteps}`;
            }
            
            // 切换显示模式
            function switchDisplayMode(mode) {
                if (mode === 'quick') {
                    quickResultDisplay.classList.remove('hidden');
                    guidedResultDisplay.classList.add('hidden');
                } else {
                    quickResultDisplay.classList.add('hidden');
                    guidedResultDisplay.classList.remove('hidden');
                }
            }
            
            uploadBtn.addEventListener('click', async () => {
                const file = imageInput.files[0];
                if (!file) { alert('请选择一张图片！'); return; }
                
                // 获取当前选择的模式和年级
                const modeInput = document.querySelector('input[name="mode"]:checked');
                currentMode = modeInput ? modeInput.value : 'quick';
                
                const gradeInput = document.querySelector('input[name="grade"]:checked');
                const currentGrade = gradeInput ? gradeInput.value : '10-12';
                
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const base64Image = event.target.result;
                    try {
                        showProgress('上传中...', '正在上传图片', 10);
                        uploadBtn.disabled = true;
                        uploadBtn.classList.add('opacity-50', 'cursor-not-allowed');
                        
                        const response = await fetch(`${SERVER_URL}/upload_image`, { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({ 
                                image_data: base64Image,
                                mode: currentMode,
                                grade: currentGrade
                            }) 
                        });
                        
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        
                        showProgress('分析中...', 'AI正在分析题目', 40);
                        
                        const data = await response.json();
                        const queryCode = data.query_code;
                        queryCodeInput.value = queryCode;
                        currentQueryCode = queryCode;
                        
                        uploadStatus.textContent = `上传成功！查询码: ${queryCode.slice(0, 8)}...`;
                        
                        // 开始轮询查询状态
                        showProgress('处理中...', '正在生成结果', 60);
                        
                        if (currentMode === 'guided') {
                            switchDisplayMode('guided');
                            // 对于逐步指导模式，开始获取提示
                            await pollForGuidedResults(queryCode);
                        } else {
                            switchDisplayMode('quick');
                            // 快速批改模式，继续原有的轮询
                            await pollForQuickResults(queryCode);
                        }
                        
                    } catch (error) {
                        console.error('Upload error:', error);
                        uploadStatus.textContent = `上传失败: ${error.message}`;
                    } finally {
                        hideProgress();
                        uploadBtn.disabled = false;
                        uploadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    }
                };
                reader.readAsDataURL(file);
            });
            copyCodeBtn.addEventListener('click', () => {
                if (queryCodeInput.value) { navigator.clipboard.writeText(queryCodeInput.value).then(() => alert('查询码已复制到剪贴板！')).catch(err => { console.error('Failed to copy: ', err); alert('复制失败，请手动复制。'); }); }
                else { alert('请先上传图片获取查询码。'); }
            });
            
            // 轮询快速批改结果
            async function pollForQuickResults(queryCode) {
                let attempts = 0;
                const maxAttempts = 30;
                
                while (attempts < maxAttempts) {
                    try {
                        const response = await fetch(`${SERVER_URL}/query_status`, { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({ query_code: queryCode }) 
                        });
                        
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        
                        const data = await response.json();
                        const status = data.status;
                        
                        if (status === 'completed') {
                            showProgress('完成！', '准备显示结果', 100);
                            queryStatus.textContent = '查询完成';
                            const renderedHtml = renderMarkdownWithLatex(data.result);
                            quickResultDisplay.innerHTML = `<div class="result-content">${renderedHtml}</div>`;
                            hasAudio = data.has_audio === true;
                            audioSection.classList.remove('hidden');
                            if (hasAudio) {
                                audioPlayer.src = `${SERVER_URL}/results/${queryCode}_audio.wav`;
                                audioPlayer.classList.remove('hidden');
                                generateAudioBtn.textContent = '🔊 重新生成语音';
                            } else {
                                audioPlayer.classList.add('hidden');
                            }
                            setTimeout(async () => {
                                const contentDiv = quickResultDisplay.querySelector('.result-content');
                                if (contentDiv) await renderLatex(contentDiv);
                            }, 100);
                            return;
                        } else if (status === 'processing') {
                            const percent = 40 + Math.min(attempts * 2, 50);
                            showProgress('AI正在分析...', `处理中，请稍候 (${attempts + 1}/${maxAttempts})`, percent);
                            queryStatus.textContent = 'AI正在分析中，请稍后查询...';
                            quickResultDisplay.innerHTML = '<p class="text-yellow-600">AI正在分析中，请稍后刷新或再次查询。</p>';
                        } else if (status === 'pending') {
                            const percent = 20 + Math.min(attempts, 20);
                            showProgress('排队中...', `任务排队中 (${attempts + 1}/${maxAttempts})`, percent);
                            queryStatus.textContent = '任务排队中，请稍后查询...';
                            quickResultDisplay.innerHTML = '<p class="text-yellow-600">任务排队中，请稍后刷新或再次查询。</p>';
                        }
                    } catch (error) {
                        console.error('Query error:', error);
                    }
                    
                    attempts++;
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }
                
                queryStatus.textContent = '查询超时，请稍后重试';
                quickResultDisplay.innerHTML = '<p class="text-red-600">查询超时，请稍后重试。</p>';
            }
            
            // 轮询逐步指导结果
            async function pollForGuidedResults(queryCode) {
                let attempts = 0;
                const maxAttempts = 30;
                
                while (attempts < maxAttempts) {
                    try {
                        const response = await fetch(`${SERVER_URL}/get_hints`, { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({ query_code: queryCode }) 
                        });
                        
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        
                        const data = await response.json();
                        
                        if (data.status === 'ready') {
                            showProgress('准备好啦！', '正在加载指导', 100);
                            currentHints = data.hints || [];
                            totalHintSteps = currentHints.length;
                            displayFirstHint();
                            return;
                        } else if (data.status === 'processing') {
                            const percent = 40 + Math.min(attempts * 2, 50);
                            showProgress('AI正在分析...', `准备指导中 (${attempts + 1}/${maxAttempts})`, percent);
                            hintContent.innerHTML = '<p class="text-yellow-600">AI正在准备中，请稍候...</p>';
                        } else if (data.status === 'pending') {
                            const percent = 20 + Math.min(attempts, 20);
                            showProgress('排队中...', `任务排队中 (${attempts + 1}/${maxAttempts})`, percent);
                            hintContent.innerHTML = '<p class="text-yellow-600">请稍候，正在准备中...</p>';
                        }
                    } catch (error) {
                        console.error('Hint query error:', error);
                    }
                    
                    attempts++;
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }
                
                hintContent.innerHTML = '<p class="text-red-600">加载超时，请稍后重试。</p>';
            }
            
            // 显示第一个提示
            function displayFirstHint() {
                currentHintStep = 1;
                updateHintProgress(1);
                renderHint(currentHints[0]);
                hintActions.classList.remove('hidden');
                checkHintButtons();
                
                // 显示知识点图谱
                loadKnowledgeGraph();
            }
            
            // 加载知识点图谱
            async function loadKnowledgeGraph() {
                if (!currentQueryCode) return;
                
                try {
                    const response = await fetch(`${SERVER_URL}/get_knowledge`, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ query_code: currentQueryCode }) 
                    });
                    
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const data = await response.json();
                    
                    if (data.status === 'ready') {
                        displayKnowledgeGraph(data.knowledge);
                    } else if (data.status === 'processing') {
                        // 稍后再试
                        setTimeout(() => loadKnowledgeGraph(), 3000);
                    }
                } catch (error) {
                    console.error('获取知识点失败:', error);
                }
            }
            
            // 快速模式加载知识点图谱
            async function loadKnowledgeGraphQuickMode() {
                if (!currentQueryCode) return;
                
                try {
                    const response = await fetch(`${SERVER_URL}/get_knowledge`, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ query_code: currentQueryCode }) 
                    });
                    
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const data = await response.json();
                    
                    if (data.status === 'ready') {
                        displayKnowledgeGraphQuickMode(data.knowledge);
                    } else if (data.status === 'processing') {
                        // 稍后再试
                        setTimeout(() => loadKnowledgeGraphQuickMode(), 3000);
                    }
                } catch (error) {
                    console.error('获取知识点失败:', error);
                }
            }
            
            // 显示知识点图谱 - 快速模式
            function displayKnowledgeGraphQuickMode(knowledge) {
                const knowledgeSection = document.getElementById('quickKnowledgeSection');
                const knowledgeContent = document.getElementById('quickKnowledgeContent');
                
                if (!knowledge || !knowledge.knowledge_points) {
                    knowledgeContent.innerHTML = '<p class="text-gray-500 text-sm">暂无知识点数据</p>';
                    return;
                }
                
                // 计算掌握率
                const total = knowledge.total || 0;
                const mastered = knowledge.mastered || 0;
                const masteryRate = total > 0 ? Math.round((mastered / total) * 100) : 0;
                
                // 构建知识点HTML
                let html = `
                    <div class="mb-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-sm font-medium text-gray-700">知识点掌握率</span>
                            <span class="text-sm font-bold ${masteryRate >= 70 ? 'text-green-600' : masteryRate >= 40 ? 'text-yellow-600' : 'text-red-600'}">${masteryRate}%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2.5">
                            <div class="h-2.5 rounded-full ${masteryRate >= 70 ? 'bg-green-600' : masteryRate >= 40 ? 'bg-yellow-500' : 'bg-red-500'}" style="width: ${masteryRate}%"></div>
                        </div>
                        <div class="text-xs text-gray-500 mt-1">
                            已掌握 ${mastered}/${total} 个知识点
                        </div>
                    </div>
                `;
                
                // 分类显示知识点
                const corePoints = knowledge.knowledge_points.filter(k => k.type === '核心');
                const basicPoints = knowledge.knowledge_points.filter(k => k.type === '基础');
                const extendPoints = knowledge.knowledge_points.filter(k => k.type === '拓展');
                
                if (corePoints.length > 0) {
                    html += '<div class="mb-3"><div class="text-sm font-semibold text-gray-700 mb-2">🎯 核心知识点</div><div class="flex flex-wrap gap-2">';
                    corePoints.forEach(k => {
                        html += `<span class="inline-block px-2 py-1 rounded text-xs ${k.mastered ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${k.name}${k.mastered ? ' ✓' : ' ✗'}</span>`;
                    });
                    html += '</div></div>';
                }
                
                if (basicPoints.length > 0) {
                    html += '<div class="mb-3"><div class="text-sm font-semibold text-gray-700 mb-2">📚 基础知识</div><div class="flex flex-wrap gap-2">';
                    basicPoints.forEach(k => {
                        html += `<span class="inline-block px-2 py-1 rounded text-xs ${k.mastered ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${k.name}${k.mastered ? ' ✓' : ' ✗'}</span>`;
                    });
                    html += '</div></div>';
                }
                
                if (extendPoints.length > 0) {
                    html += '<div class="mb-3"><div class="text-sm font-semibold text-gray-700 mb-2">🚀 拓展知识</div><div class="flex flex-wrap gap-2">';
                    extendPoints.forEach(k => {
                        html += `<span class="inline-block px-2 py-1 rounded text-xs ${k.mastered ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${k.name}${k.mastered ? ' ✓' : ' ✗'}</span>`;
                    });
                    html += '</div></div>';
                }
                
                knowledgeContent.innerHTML = html;
                knowledgeSection.classList.remove('hidden');
            }
            
            // 显示知识点图谱
            function displayKnowledgeGraph(knowledge) {
                const knowledgeSection = document.getElementById('knowledgeSection');
                const knowledgeContent = document.getElementById('knowledgeContent');
                
                if (!knowledge || !knowledge.knowledge_points) {
                    knowledgeContent.innerHTML = '<p class="text-gray-500 text-sm">暂无知识点数据</p>';
                    return;
                }
                
                // 计算掌握率
                const total = knowledge.total || 0;
                const mastered = knowledge.mastered || 0;
                const notMastered = knowledge.not_mastered || 0;
                const masteryRate = total > 0 ? Math.round((mastered / total) * 100) : 0;
                
                // 构建知识点HTML
                let html = `
                    <div class="mb-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-sm font-medium text-gray-700">知识点掌握率</span>
                            <span class="text-sm font-bold ${masteryRate >= 70 ? 'text-green-600' : masteryRate >= 40 ? 'text-yellow-600' : 'text-red-600'}">${masteryRate}%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2.5">
                            <div class="h-2.5 rounded-full ${masteryRate >= 70 ? 'bg-green-600' : masteryRate >= 40 ? 'bg-yellow-500' : 'bg-red-500'}" style="width: ${masteryRate}%"></div>
                        </div>
                        <div class="text-xs text-gray-500 mt-1">
                            已掌握 ${mastered}/${total} 个知识点
                        </div>
                    </div>
                `;
                
                // 分类显示知识点
                const corePoints = knowledge.knowledge_points.filter(k => k.type === '核心');
                const basicPoints = knowledge.knowledge_points.filter(k => k.type === '基础');
                const extendPoints = knowledge.knowledge_points.filter(k => k.type === '拓展');
                
                if (corePoints.length > 0) {
                    html += '<div class="mb-3"><div class="text-sm font-semibold text-gray-700 mb-2">🎯 核心知识点</div><div class="flex flex-wrap gap-2">';
                    corePoints.forEach(k => {
                        html += `<span class="inline-block px-2 py-1 rounded text-xs ${k.mastered ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${k.name}${k.mastered ? ' ✓' : ' ✗'}</span>`;
                    });
                    html += '</div></div>';
                }
                
                if (basicPoints.length > 0) {
                    html += '<div class="mb-3"><div class="text-sm font-semibold text-gray-700 mb-2">📚 基础知识</div><div class="flex flex-wrap gap-2">';
                    basicPoints.forEach(k => {
                        html += `<span class="inline-block px-2 py-1 rounded text-xs ${k.mastered ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${k.name}${k.mastered ? ' ✓' : ' ✗'}</span>`;
                    });
                    html += '</div></div>';
                }
                
                if (extendPoints.length > 0) {
                    html += '<div class="mb-3"><div class="text-sm font-semibold text-gray-700 mb-2">🚀 拓展知识</div><div class="flex flex-wrap gap-2">';
                    extendPoints.forEach(k => {
                        html += `<span class="inline-block px-2 py-1 rounded text-xs ${k.mastered ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${k.name}${k.mastered ? ' ✓' : ' ✗'}</span>`;
                    });
                    html += '</div></div>';
                }
                
                knowledgeContent.innerHTML = html;
                knowledgeSection.classList.remove('hidden');
            }
            
            // 渲染单个提示
            function renderHint(hint) {
                const renderedHtml = renderMarkdownWithLatex(hint);
                hintContent.innerHTML = `<div class="result-content">${renderedHtml}</div>`;
                setTimeout(async () => {
                    const contentDiv = hintContent.querySelector('.result-content');
                    if (contentDiv) await renderLatex(contentDiv);
                }, 100);
            }
            
            // 检查按钮状态
            function checkHintButtons() {
                if (currentHintStep >= totalHintSteps) {
                    nextHintBtn.disabled = true;
                    nextHintBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    nextHintBtn.textContent = '✅ 已显示所有提示';
                } else {
                    nextHintBtn.disabled = false;
                    nextHintBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    nextHintBtn.textContent = '💡 下一步提示';
                }
            }
            
            // 下一步提示按钮
            nextHintBtn.addEventListener('click', () => {
                if (currentHintStep < totalHintSteps) {
                    currentHintStep++;
                    updateHintProgress(currentHintStep);
                    renderHint(currentHints[currentHintStep - 1]);
                    checkHintButtons();
                }
            });
            
            // 查看完整解答按钮
            showSolutionBtn.addEventListener('click', async () => {
                if (confirm('确定要查看完整解答吗？最好先自己尝试一下哦！')) {
                    try {
                        const response = await fetch(`${SERVER_URL}/query_status`, { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({ query_code: currentQueryCode }) 
                        });
                        
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        
                        const data = await response.json();
                        if (data.status === 'completed') {
                            switchDisplayMode('quick');
                            const renderedHtml = renderMarkdownWithLatex(data.result);
                            quickResultDisplay.innerHTML = `<div class="result-content">${renderedHtml}</div>`;
                            hasAudio = data.has_audio === true;
                            audioSection.classList.remove('hidden');
                            if (hasAudio) {
                                audioPlayer.src = `${SERVER_URL}/results/${currentQueryCode}_audio.wav`;
                                audioPlayer.classList.remove('hidden');
                            }
                            setTimeout(async () => {
                                const contentDiv = quickResultDisplay.querySelector('.result-content');
                                if (contentDiv) await renderLatex(contentDiv);
                            }, 100);
                        }
                    } catch (error) {
                        console.error('Get solution error:', error);
                        alert('获取解答失败，请稍后重试。');
                    }
                }
            });
            
            queryBtn.addEventListener('click', async () => {
                const currentTime = new Date().getTime();
                if (currentTime - lastRequestTime < BUTTON_COOLDOWN) {
                    const remainingTime = Math.ceil((BUTTON_COOLDOWN - (currentTime - lastRequestTime)) / 1000);
                    queryStatus.textContent = `请稍候 ${remainingTime} 秒...`;
                    return;
                }
                lastRequestTime = currentTime;
                const queryCode = queryCodeInput.value.trim();
                if (!queryCode) { alert('请输入查询码或先上传图片！'); return; }
                try {
                    queryStatus.innerHTML = '<span class="flex items-center"><span class="spinner inline-block w-4 h-4 border-2 border-blue-500 rounded-full mr-2"></span> 正在查询...</span>';
                    queryBtn.disabled = true;
                    queryBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    const response = await fetch(`${SERVER_URL}/query_status`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query_code: queryCode }) });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    const status = data.status;
                    const result = data.result;
                    if (status === 'completed') {
                        queryStatus.textContent = '查询完成';
                        // 使用 Markdown 渲染
                        const renderedHtml = renderMarkdownWithLatex(result);
                        quickResultDisplay.innerHTML = `<div class="result-content">${renderedHtml}</div>`;
                        currentQueryCode = queryCode;
                        hasAudio = data.has_audio === true;
                        audioSection.classList.remove('hidden');
                        if (hasAudio) {
                            audioPlayer.src = `${SERVER_URL}/results/${queryCode}_audio.wav`;
                            audioPlayer.classList.remove('hidden');
                            generateAudioBtn.textContent = '🔊 重新生成语音';
                        } else {
                            audioPlayer.classList.add('hidden');
                        }
                        setTimeout(async () => {
                            const contentDiv = quickResultDisplay.querySelector('.result-content');
                            if (contentDiv) await renderLatex(contentDiv);
                        }, 100);
                        
                        // 显示知识点图谱
                        loadKnowledgeGraphQuickMode();
                        
                        // 默认使用快速批改模式显示
                        currentMode = 'quick';
                        switchDisplayMode('quick');
                    } else if (status === 'processing') {
                        queryStatus.textContent = 'AI正在分析中，请稍后查询...';
                        quickResultDisplay.innerHTML = '<p class="text-yellow-600">AI正在分析中，请稍后刷新或再次查询。</p>';
                    } else if (status === 'pending') {
                        queryStatus.textContent = '任务排队中，请稍后查询...';
                        quickResultDisplay.innerHTML = '<p class="text-yellow-600">任务排队中，请稍后刷新或再次查询。</p>';
                    } else {
                        queryStatus.textContent = '未知状态';
                        quickResultDisplay.innerHTML = `<p class="text-red-500">服务器返回未知状态: ${status}</p>`;
                    }
                } catch (error) {
                    console.error('Query error:', error);
                    queryStatus.textContent = `查询失败: ${error.message}`;
                    quickResultDisplay.innerHTML = `<p class="text-red-600">查询失败: ${error.message}</p>`;
                } finally {
                    queryBtn.disabled = false;
                    queryBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            });
            
            generateAudioBtn.addEventListener('click', async () => {
                if (!currentQueryCode) return;
                try {
                    generateAudioBtn.disabled = true;
                    generateAudioBtn.textContent = '🔊 正在生成语音...';
                    const response = await fetch(`${SERVER_URL}/generate_audio`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query_code: currentQueryCode })
                    });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    if (data.status === 'generated' || data.status === 'exists') {
                        audioPlayer.src = data.audio_url;
                        audioPlayer.classList.remove('hidden');
                        audioPlayer.play();
                        generateAudioBtn.textContent = '🔊 重新生成语音';
                        hasAudio = true;
                    } else {
                        alert('生成失败: ' + (data.error || '未知错误'));
                    }
                } catch (error) {
                    console.error('生成语音错误:', error);
                    alert('生成失败: ' + error.message);
                } finally {
                    generateAudioBtn.disabled = false;
                }
            });
        });
    </script>
