<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学作业智能批改助手 - 首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-4xl w-full">
        <h1 class="text-4xl md:text-5xl font-bold text-white text-center mb-4">
            数学作业智能批改助手
        </h1>
        <p class="text-lg text-white/80 text-center mb-12">
            选择您的身份进入系统
        </p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- 管理员卡片 -->
            <a href="/admin" class="card bg-white rounded-2xl p-8 text-center shadow-xl">
                <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 018.683 3.042 12.008 12.008 0 003.042 8.683M12 18.75a6.711 6.711 0 002.418.507"></path>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">管理员</h2>
                <p class="text-gray-500">
                    系统管理、模型配置、日志查看</p>
            </a>

            <!-- 教师卡片 -->
            <a href="/teacher" class="card bg-white rounded-2xl p-8 text-center shadow-xl">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">教师</h2>
                <p class="text-gray-500">
                    创建考试、批改作业、管理班级</p>
            </a>

            <!-- 学生卡片 -->
            <a href="/student" class="card bg-white rounded-2xl p-8 text-center shadow-xl">
                <div class="w-20 h-20 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg class="w-10 h-10 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">学生</h2>
                <p class="text-gray-500">
                    查看成绩、错题复习、在线练习</p>
            </a>
        </div>
        
        <div class="mt-12 text-center text-white/60 text-sm">
            <p>© 2024 数学作业智能批改助手. 选择上方卡片进入对应系统</p>
        </div>
    </div>
</body>
</html>
