<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试卷库管理平台 - 教师端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .drop-zone {
            border: 2px dashed #ccc;
            transition: all 0.3s ease;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        .tab-active {
            background-color: #3b82f6;
            color: white;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center text-indigo-600 mb-8">📚 试卷库管理平台</h1>
        
        <!-- 导航标签 -->
        <div class="flex flex-wrap mb-8 bg-white rounded-lg shadow p-2 gap-2">
            <button onclick="showTab('upload')" id="tab-upload" class="flex-1 min-w-[100px] px-4 py-2 rounded-lg font-medium transition-all tab-active">
                📤 批量上传
            </button>
            <button onclick="showTab('classes')" id="tab-classes" class="flex-1 min-w-[100px] px-4 py-2 rounded-lg font-medium transition-all hover:bg-gray-100">
                🏫 班级管理
            </button>
            <button onclick="showTab('papers')" id="tab-papers" class="flex-1 min-w-[100px] px-4 py-2 rounded-lg font-medium transition-all hover:bg-gray-100">
                📋 试卷管理
            </button>
            <button onclick="showTab('analysis')" id="tab-analysis" class="flex-1 min-w-[100px] px-4 py-2 rounded-lg font-medium transition-all hover:bg-gray-100">
                📊 学情分析
            </button>
            <button onclick="showTab('scores')" id="tab-scores" class="flex-1 min-w-[100px] px-4 py-2 rounded-lg font-medium transition-all hover:bg-gray-100">
                📈 成绩管理
            </button>
            <button onclick="showTab('knowledge')" id="tab-knowledge" class="flex-1 min-w-[100px] px-4 py-2 rounded-lg font-medium transition-all hover:bg-gray-100">
                🕸️ 知识图谱
            </button>
        </div>
        
        <!-- 批量上传标签页 -->
        <div id="panel-upload" class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-semibold mb-6">📤 批量上传试卷</h2>
            
            <!-- 试卷信息 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">试卷名称</label>
                    <input type="text" id="paper-name" placeholder="例如：期中测试卷" class="shadow border rounded w-full py-2 px-3">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">年级</label>
                    <select id="paper-grade" class="shadow border rounded w-full py-2 px-3">
                        <option value="1-2">小学1-2年级</option>
                        <option value="3-4">小学3-4年级</option>
                        <option value="5-6">小学5-6年级</option>
                        <option value="7-9">初中</option>
                        <option value="10-12" selected>高中</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">关联班级（可选）</label>
                    <select id="paper-class" class="shadow border rounded w-full py-2 px-3">
                        <option value="">不关联班级</option>
                    </select>
                </div>
            </div>
            
            <!-- 智能识别选项 -->
            <div class="bg-blue-50 rounded-lg p-4 mb-6">
                <h3 class="font-medium mb-3 text-blue-800">🤖 智能识别设置</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="auto-detect-names" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm">自动识别答题卡上的姓名和考号</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="auto-grade" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm">自动批改客观题</span>
                    </label>
                </div>
                <p class="text-xs text-blue-600 mt-2">
                    💡 提示：启用自动识别后，系统会自动检测答题卡上的姓名区域，并将同一学生的多面答题卷关联在一起
                </p>
            </div>
            
            <!-- 拖拽上传区 -->
            <div id="drop-zone" class="drop-zone rounded-lg p-8 text-center cursor-pointer mb-6">
                <div class="text-gray-500">
                    <div class="text-4xl mb-2">📁</div>
                    <p class="font-medium">拖拽试卷图片到这里，或点击选择</p>
                    <p class="text-sm text-gray-400 mt-1">支持一次上传多张图片</p>
                </div>
                <input type="file" id="file-input" accept="image/*" multiple class="hidden">
            </div>
            
            <!-- 已选文件 -->
            <div id="selected-files" class="mb-6 hidden">
                <h3 class="font-medium mb-2">已选择文件：</h3>
                <div id="file-list" class="max-h-40 overflow-y-auto bg-gray-50 rounded p-3 space-y-2"></div>
            </div>
            
            <!-- 上传按钮 -->
            <button onclick="uploadPapers()" id="upload-btn" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded disabled:opacity-50">
                开始上传并分析
            </button>
            
            <!-- 进度显示 -->
            <div id="progress-container" class="mt-6 hidden">
                <div class="text-sm font-medium mb-2" id="progress-text">上传中...</div>
                <div class="w-full bg-gray-200 rounded-full h-3">
                    <div id="progress-bar" class="progress-bar bg-blue-500 h-3 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </div>
        
        <!-- 班级管理标签页 -->
        <div id="panel-classes" class="bg-white rounded-lg shadow p-6 hidden">
            <h2 class="text-xl font-semibold mb-6">🏫 班级管理</h2>
            
            <!-- 创建班级 -->
            <div class="bg-gray-50 rounded-lg p-4 mb-6">
                <h3 class="font-medium mb-3">创建新班级</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">班级名称</label>
                        <input type="text" id="new-class-name" placeholder="例如：高一(1)班" class="shadow border rounded w-full py-2 px-3">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">年级</label>
                        <select id="new-class-grade" class="shadow border rounded w-full py-2 px-3">
                            <option value="1-2">小学1-2年级</option>
                            <option value="3-4">小学3-4年级</option>
                            <option value="5-6">小学5-6年级</option>
                            <option value="7-9">初中</option>
                            <option value="10-12" selected>高中</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">班主任</label>
                        <input type="text" id="new-class-teacher" placeholder="姓名" class="shadow border rounded w-full py-2 px-3">
                    </div>
                </div>
                <button onclick="createClass()" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-6 rounded">
                    创建班级
                </button>
            </div>
            
            <!-- 班级列表 -->
            <div>
                <h3 class="font-medium mb-3">班级列表</h3>
                <div id="class-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- 班级卡片将在这里生成 -->
                </div>
            </div>
        </div>
        
        <!-- 试卷管理标签页 -->
        <div id="panel-papers" class="bg-white rounded-lg shadow p-6 hidden">
            <h2 class="text-xl font-semibold mb-6">📋 试卷管理</h2>
            
            <div id="paper-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- 试卷卡片将在这里生成 -->
            </div>
        </div>
        
        <!-- 学情分析标签页 -->
        <div id="panel-analysis" class="bg-white rounded-lg shadow p-6 hidden">
            <h2 class="text-xl font-semibold mb-6">📊 班级学情分析</h2>
            
            <!-- 选择班级 -->
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">选择班级</label>
                <select id="analysis-class-select" class="shadow border rounded w-full md:w-64 py-2 px-3" onchange="loadClassAnalysis()">
                    <option value="">请选择班级</option>
                </select>
            </div>
            
            <!-- 分析结果 -->
            <div id="analysis-result">
                <!-- 分析结果将在这里显示 -->
            </div>
        </div>
        
        <!-- 知识图谱标签页 -->
        <div id="panel-knowledge" class="bg-white rounded-lg shadow p-6 hidden">
            <h2 class="text-xl font-semibold mb-6">🕸️ 知识点关联图谱</h2>
            
            <button onclick="loadKnowledgeGraph()" class="bg-purple-500 hover:bg-purple-700 text-white font-bold py-2 px-6 rounded mb-6">
                加载知识点图谱
            </button>
            
            <!-- 知识点统计 -->
            <div id="knowledge-stats" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
                <!-- 统计卡片将在这里生成 -->
            </div>
            
            <!-- 知识点关联 -->
            <div id="knowledge-relations" class="bg-gray-50 rounded-lg p-4">
                <h3 class="font-medium mb-3">知识点关联</h3>
                <div id="relations-list">
                    <!-- 关联关系将在这里显示 -->
                </div>
            </div>
        </div>
        
        <!-- 成绩管理标签页 -->
        <div id="panel-scores" class="bg-white rounded-lg shadow p-6 hidden">
            <h2 class="text-xl font-semibold mb-6">📈 学生成绩管理</h2>
            
            <!-- 选择班级和试卷 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">选择班级</label>
                    <select id="score-class-select" class="shadow border rounded w-full py-2 px-3" onchange="loadScoreData()">
                        <option value="">请选择班级</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">选择试卷</label>
                    <select id="score-paper-select" class="shadow border rounded w-full py-2 px-3" onchange="loadScoreData()">
                        <option value="">所有试卷</option>
                    </select>
                </div>
                <div>
                    <button onclick="showAddScoreModal()" class="w-full bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded mt-7">
                        ➕ 录入成绩
                    </button>
                </div>
            </div>
            
            <!-- 成绩统计卡片 -->
            <div id="score-statistics" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <!-- 统计卡片将在这里生成 -->
            </div>
            
            <!-- 成绩列表 -->
            <div class="mb-6">
                <h3 class="font-medium mb-3">📋 成绩列表</h3>
                <div id="score-table" class="overflow-x-auto">
                    <!-- 成绩表格将在这里生成 -->
                </div>
            </div>
            
            <!-- 学生进步追踪 -->
            <div>
                <h3 class="font-medium mb-3">📈 学生进步追踪</h3>
                <div id="student-progress" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- 学生进步卡片将在这里生成 -->
                </div>
            </div>
        </div>
        
        <!-- 成绩录入模态框 -->
        <div id="score-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
            <div class="bg-white rounded-lg max-w-md w-full mx-4 p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold">录入学生成绩</h2>
                    <button onclick="closeScoreModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">选择学生</label>
                        <select id="score-student-select" class="shadow border rounded w-full py-2 px-3">
                            <option value="">请选择学生</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">选择试卷</label>
                        <select id="score-paper-select-modal" class="shadow border rounded w-full py-2 px-3">
                            <option value="">请选择试卷</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2">得分</label>
                            <input type="number" id="score-value" min="0" class="shadow border rounded w-full py-2 px-3">
                        </div>
                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2">总分</label>
                            <input type="number" id="score-total" min="1" value="100" class="shadow border rounded w-full py-2 px-3">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">备注</label>
                        <textarea id="score-notes" rows="2" class="shadow border rounded w-full py-2 px-3" placeholder="可选备注"></textarea>
                    </div>
                    <button onclick="submitScore()" class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                        提交成绩
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 班级详情模态框 -->
        <div id="class-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
            <div class="bg-white rounded-lg max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 id="modal-class-name" class="text-xl font-semibold">班级详情</h2>
                        <button onclick="closeClassModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                    </div>
                    
                    <!-- 分配试卷 -->
                    <div class="mb-6">
                        <h3 class="font-medium mb-3">分配试卷</h3>
                        <div class="flex gap-2">
                            <select id="assign-paper-select" class="shadow border rounded flex-1 py-2 px-3">
                                <option value="">选择试卷</option>
                            </select>
                            <button onclick="assignPaperToClass()" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                                分配
                            </button>
                        </div>
                    </div>
                    
                    <!-- 添加学生 -->
                    <div class="mb-6">
                        <h3 class="font-medium mb-3">添加学生</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-3">
                            <input type="text" id="student-name" placeholder="学生姓名" class="shadow border rounded py-2 px-3">
                            <input type="text" id="student-number" placeholder="学号" class="shadow border rounded py-2 px-3">
                        </div>
                        <button onclick="addStudentToClass()" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">
                            添加
                        </button>
                    </div>
                    
                    <!-- 班级学情 -->
                    <div id="class-performance">
                        <!-- 班级学情将在这里显示 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = window.location.origin;
        let selectedFiles = [];
        let currentClassId = null;
        
        // ========== 标签页切换 ==========
        
        function showTab(tabName) {
            const tabs = ['upload', 'classes', 'papers', 'analysis', 'scores', 'knowledge'];
            tabs.forEach(tab => {
                const panel = document.getElementById(`panel-${tab}`);
                const btn = document.getElementById(`tab-${tab}`);
                if (tab === tabName) {
                    panel.classList.remove('hidden');
                    btn.classList.add('tab-active');
                    btn.classList.remove('hover:bg-gray-100');
                } else {
                    panel.classList.add('hidden');
                    btn.classList.remove('tab-active');
                    btn.classList.add('hover:bg-gray-100');
                }
            });
            
            if (tabName === 'classes') {
                loadClasses();
            } else if (tabName === 'papers') {
                loadPapers();
            } else if (tabName === 'analysis') {
                loadClassOptions();
            } else if (tabName === 'scores') {
                loadScoreClassOptions();
                loadScorePaperOptions();
            }
        }
        
        // ========== 批量上传 ==========
        
        function initDragDrop() {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            
            dropZone.addEventListener('click', () => fileInput.click());
            
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });
            
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });
            
            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
            });
        }
        
        function handleFiles(files) {
            selectedFiles = [...files];
            updateFileList();
        }
        
        function updateFileList() {
            const fileList = document.getElementById('file-list');
            const selectedFilesDiv = document.getElementById('selected-files');
            
            if (selectedFiles.length === 0) {
                selectedFilesDiv.classList.add('hidden');
                return;
            }
            
            selectedFilesDiv.classList.remove('hidden');
            fileList.innerHTML = selectedFiles.map((file, index) => `
                <div class="flex justify-between items-center">
                    <span class="text-sm">${file.name} (${(file.size / 1024).toFixed(1)} KB)</span>
                    <button onclick="removeFile(${index})" class="text-red-500 hover:text-red-700 text-sm">✕</button>
                </div>
            `).join('');
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
        }
        
        async function uploadPapers() {
            if (selectedFiles.length === 0) {
                alert('请选择要上传的试卷');
                return;
            }
            
            const paperName = document.getElementById('paper-name').value || '未命名试卷';
            const grade = document.getElementById('paper-grade').value;
            const classId = document.getElementById('paper-class').value;
            const autoDetect = document.getElementById('auto-detect-names').checked;
            
            const formData = new FormData();
            formData.append('name', paperName);
            formData.append('grade', grade);
            formData.append('class_id', classId);
            formData.append('auto_detect', autoDetect);
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });
            
            document.getElementById('progress-container').classList.remove('hidden');
            document.getElementById('upload-btn').disabled = true;
            updateProgress(10, '上传中...');
            
            try {
                const response = await fetch(`${SERVER_URL}/api/library/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    updateProgress(100, '分析完成！');
                    
                    // 显示详细的分析结果
                    let message = `试卷上传并分析完成！\n`;
                    message += `总题数：${result.total_questions}\n`;
                    message += `正确数：${result.correct_count}\n`;
                    message += `正确率：${result.accuracy.toFixed(1)}%\n`;
                    
                    if (result.detected_students > 0) {
                        message += `\n识别到 ${result.detected_students} 位学生的答题卡`;
                    }
                    if (result.multi_page_count > 0) {
                        message += `\n包含 ${result.multi_page_count} 位学生的多面答题卷`;
                    }
                    
                    alert(message);
                    
                    selectedFiles = [];
                    updateFileList();
                    
                    // 自动切换到班级管理查看关联结果
                    if (classId) {
                        showTab('classes');
                    }
                } else {
                    alert('上传失败: ' + (result.error || '未知错误'));
                }
            } catch (e) {
                console.error('上传失败:', e);
                alert('上传失败，请检查网络连接');
            } finally {
                document.getElementById('upload-btn').disabled = false;
            }
        }
        
        function updateProgress(percent, text) {
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-text').textContent = text;
        }
        
        // ========== 班级管理 ==========
        
        async function loadClasses() {
            try {
                const response = await fetch(`${SERVER_URL}/api/classes`);
                const result = await response.json();
                
                if (result.success) {
                    renderClasses(result.classes);
                }
            } catch (e) {
                console.error('加载班级失败:', e);
            }
        }
        
        function renderClasses(classes) {
            const container = document.getElementById('class-list');
            
            if (!classes || classes.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">暂无班级，请先创建班级</p>';
                return;
            }
            
            container.innerHTML = classes.map(cls => `
                <div class="border rounded-lg p-4 hover:shadow-md transition-shadow cursor-pointer" onclick="openClassModal('${cls.id}')">
                    <h3 class="font-semibold text-lg mb-2">${cls.name}</h3>
                    <p class="text-sm text-gray-600 mb-1">年级: ${cls.grade}</p>
                    ${cls.teacher_name ? `<p class="text-sm text-gray-600 mb-1">班主任: ${cls.teacher_name}</p>` : ''}
                    <p class="text-sm text-gray-600">学生数: ${(cls.students || []).length}</p>
                    <p class="text-sm text-gray-600">试卷数: ${(cls.assigned_papers || []).length}</p>
                    <div class="mt-3 flex gap-2">
                        <button onclick="event.stopPropagation(); generateReport('${cls.id}')" class="text-xs bg-blue-500 text-white px-2 py-1 rounded">
                            生成报告
                        </button>
                        <button onclick="event.stopPropagation(); deleteClass('${cls.id}')" class="text-xs bg-red-500 text-white px-2 py-1 rounded">
                            删除
                        </button>
                    </div>

        function renderScoreTable(scores) {
            const container = document.getElementById('score-table');
            
            if (!scores || scores.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-4">暂无成绩记录</p>';
                return;
            }
            
            // 按排名排序
            const sortedScores = [...scores].sort((a, b) => {
                const aPct = a.score / a.total_score;
                const bPct = b.score / b.total_score;
                return bPct - aPct;
            });
            
            const table = `
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">排名</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">学号</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">姓名</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">试卷</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">得分</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">百分比</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">记录时间</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        ${sortedScores.map((score, index) => {
                            const percentage = (score.score / score.total_score * 100).toFixed(1);
                            const bgColor = percentage >= 90 ? 'bg-green-50' : percentage >= 60 ? 'bg-yellow-50' : 'bg-red-50';
                            return `
                                <tr class="${bgColor}">
                                    <td class="px-4 py-2 whitespace-nowrap font-medium">${index + 1}</td>
                                    <td class="px-4 py-2 whitespace-nowrap">${score.student_number || '-'}</td>
                                    <td class="px-4 py-2 whitespace-nowrap">${score.student_name}</td>
                                    <td class="px-4 py-2 whitespace-nowrap">${score.paper_name}</td>
                                    <td class="px-4 py-2 whitespace-nowrap">${score.score}/${score.total_score}</td>
                                    <td class="px-4 py-2 whitespace-nowrap font-medium ${percentage >= 60 ? 'text-green-700' : 'text-red-700'}">
                                        ${percentage}%
                                    </td>
                                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-500">
                                        ${new Date(score.recorded_at).toLocaleDateString('zh-CN')}
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
            
            container.innerHTML = table;
        }
        
        async function loadStudentProgress(classId) {
            try {
                const response = await fetch(`${SERVER_URL}/api/classes/${classId}`);
                const result = await response.json();
                
                if (result.success && result.class) {
                    const students = result.class.students || [];
                    const progressPromises = students.map(student => 
                        fetch(`${SERVER_URL}/api/classes/${classId}/students/${student.id}/progress`)
                            .then(res => res.json())
                            .then(res => ({ student, progress: res.progress }))
                            .catch(() => null)
                    );
                    
                    const progressData = await Promise.all(progressPromises);
                    renderStudentProgress(progressData.filter(p => p !== null));
                }
            } catch (e) {
                console.error('加载学生进步失败:', e);
            }
        }
        
        function renderStudentProgress(progressData) {
            const container = document.getElementById('student-progress');
            
            if (!progressData || progressData.length === 0) {
                container.innerHTML = '<p class="text-gray-500 col-span-3 text-center py-4">暂无进步数据</p>';
                return;
            }
            
            container.innerHTML = progressData.map(({ student, progress }) => {
                const trendIcon = progress.trend === 'improving' ? '📈' : progress.trend === 'declining' ? '📉' : '➡️';
                const trendColor = progress.trend === 'improving' ? 'green' : progress.trend === 'declining' ? 'red' : 'gray';
                const bgColor = progress.trend === 'improving' ? 'bg-green-50 border-green-200' : progress.trend === 'declining' ? 'bg-red-50 border-red-200' : 'bg-gray-50 border-gray-200';
                
                if (!progress.has_progress) {
                    return `
                        <div class="border rounded-lg p-4 ${bgColor}">
                            <div class="font-medium mb-2">${student.name}</div>
                            <p class="text-sm text-gray-600">${progress.message || '暂无进步数据'}</p>
                        </div>
                    `;
                }
                
                return `
                    <div class="border rounded-lg p-4 ${bgColor}">
                        <div class="flex justify-between items-center mb-2">
                            <div class="font-medium">${student.name}</div>
                            <div class="text-2xl">${trendIcon}</div>
                        </div>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <div>
                                <div class="text-gray-500">初始平均</div>
                                <div class="font-medium">${progress.first_average}%</div>
                            </div>
                            <div>
                                <div class="text-gray-500">最近平均</div>
                                <div class="font-medium">${progress.recent_average}%</div>
                            </div>
                        </div>
                        <div class="mt-2 pt-2 border-t border-${trendColor}-200">
                            <div class="flex justify-between items-center">
                                <span class="text-sm text-gray-600">进步情况</span>
                                <span class="text-sm font-medium text-${trendColor}-700">
                                    ${progress.progress > 0 ? '+' : ''}${progress.progress}%
                                </span>
                            </div>
                            <div class="text-xs text-gray-500 mt-1">共 ${progress.total_exams} 次考试</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        async function showAddScoreModal() {
            const classId = document.getElementById('score-class-select').value;
            
            if (!classId) {
                alert('请先选择班级');
                return;
            }
            
            // 加载学生列表
            try {
                const response = await fetch(`${SERVER_URL}/api/classes/${classId}`);
                const result = await response.json();
                
                if (result.success && result.class) {
                    const students = result.class.students || [];
                    const select = document.getElementById('score-student-select');
                    select.innerHTML = '<option value="">请选择学生</option>' +
                        students.map(s => `<option value="${s.id}">${s.name} ${s.number ? '(' + s.number + ')' : ''}</option>`).join('');
                    
                    // 显示模态框
                    document.getElementById('score-modal').classList.remove('hidden');
                }
            } catch (e) {
                console.error('加载学生列表失败:', e);
                alert('加载学生列表失败');
            }
        }
        
        function closeScoreModal() {
            document.getElementById('score-modal').classList.add('hidden');
        }
        
        async function submitScore() {
            const classId = document.getElementById('score-class-select').value;
            const studentId = document.getElementById('score-student-select').value;
            const paperId = document.getElementById('score-paper-select-modal').value;
            const score = document.getElementById('score-value').value;
            const total = document.getElementById('score-total').value;
            const notes = document.getElementById('score-notes').value;
            
            if (!studentId) {
                alert('请选择学生');
                return;
            }
            
            if (!paperId) {
                alert('请选择试卷');
                return;
            }
            
            if (!score) {
                alert('请输入得分');
                return;
            }
            
            try {
                const response = await fetch(`${SERVER_URL}/api/classes/${classId}/scores`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        student_id: studentId,
                        score: {
                            paper_id: paperId,
                            score: parseFloat(score),
                            total_score: parseFloat(total) || 100,
                            notes: notes
                        }
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('成绩录入成功！');
                    closeScoreModal();
                    
                    // 清空表单
                    document.getElementById('score-student-select').value = '';
                    document.getElementById('score-paper-select-modal').value = '';
                    document.getElementById('score-value').value = '';
                    document.getElementById('score-notes').value = '';
                    
                    // 刷新成绩数据
                    loadScoreData();
                } else {
                    alert('录入失败: ' + (result.error || '未知错误'));
                }
            } catch (e) {
                console.error('提交成绩失败:', e);
                alert('提交失败，请检查网络连接');
            }
        }
        
        // ========== 初始化 ==========
        
        document.addEventListener('DOMContentLoaded', () => {
            initDragDrop();
            loadClassesForUpload();  // 加载班级列表
            
            // 点击模态框外部关闭
            document.getElementById('score-modal').addEventListener('click', (e) => {
                if (e.target.id === 'score-modal') {
                    closeScoreModal();
                }
            });
            
            document.getElementById('class-modal').addEventListener('click', (e) => {
                if (e.target.id === 'class-modal') {
                    closeClassModal();
                }
            });
        });
        
        async function loadClassesForUpload() {
            try {
                const response = await fetch(`${SERVER_URL}/api/classes`);
                const result = await response.json();
                
                if (result.success) {
                    const select = document.getElementById('paper-class');
                    select.innerHTML = '<option value="">不关联班级</option>' + 
                        result.classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                }
            } catch (e) {
                console.error('加载班级列表失败:', e);
            }
        }
    </script>
</body>
</html>
