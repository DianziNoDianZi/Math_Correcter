<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试卷库管理平台 - 教师端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .drop-zone {
            border: 2px dashed #ccc;
            transition: all 0.3s ease;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
        .tab-active {
            background-color: #3b82f6;
            color: white;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center text-indigo-600 mb-8">📚 试卷库管理平台</h1>
        
        <!-- 导航标签 -->
        <div class="flex flex-wrap mb-8 bg-white rounded-lg shadow p-2 gap-2">
            <button onclick="showTab('upload')" id="tab-upload" class="flex-1 min-w-[100px] px-4 py-2 rounded-lg font-medium transition-all tab-active">
                📤 批量上传
            </button>
            <button onclick="showTab('classes')" id="tab-classes" class="flex-1 min-w-[100px] px-4 py-2 rounded-lg font-medium transition-all hover:bg-gray-100">
                🏫 班级管理
            </button>
            <button onclick="showTab('papers')" id="tab-papers" class="flex-1 min-w-[100px] px-4 py-2 rounded-lg font-medium transition-all hover:bg-gray-100">
                📋 试卷管理
            </button>
            <button onclick="showTab('analysis')" id="tab-analysis" class="flex-1 min-w-[100px] px-4 py-2 rounded-lg font-medium transition-all hover:bg-gray-100">
                📊 学情分析
            </button>
            <button onclick="showTab('knowledge')" id="tab-knowledge" class="flex-1 min-w-[100px] px-4 py-2 rounded-lg font-medium transition-all hover:bg-gray-100">
                🕸️ 知识图谱
            </button>
        </div>
        
        <!-- 批量上传标签页 -->
        <div id="panel-upload" class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-semibold mb-6">📤 批量上传试卷</h2>
            
            <!-- 试卷信息 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">试卷名称</label>
                    <input type="text" id="paper-name" placeholder="例如：期中测试卷" class="shadow border rounded w-full py-2 px-3">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">年级</label>
                    <select id="paper-grade" class="shadow border rounded w-full py-2 px-3">
                        <option value="1-2">小学1-2年级</option>
                        <option value="3-4">小学3-4年级</option>
                        <option value="5-6">小学5-6年级</option>
                        <option value="7-9">初中</option>
                        <option value="10-12" selected>高中</option>
                    </select>
                </div>
            </div>
            
            <!-- 拖拽上传区 -->
            <div id="drop-zone" class="drop-zone rounded-lg p-8 text-center cursor-pointer mb-6">
                <div class="text-gray-500">
                    <div class="text-4xl mb-2">📁</div>
                    <p class="font-medium">拖拽试卷图片到这里，或点击选择</p>
                    <p class="text-sm text-gray-400 mt-1">支持一次上传多张图片</p>
                </div>
                <input type="file" id="file-input" accept="image/*" multiple class="hidden">
            </div>
            
            <!-- 已选文件 -->
            <div id="selected-files" class="mb-6 hidden">
                <h3 class="font-medium mb-2">已选择文件：</h3>
                <div id="file-list" class="max-h-40 overflow-y-auto bg-gray-50 rounded p-3 space-y-2"></div>
            </div>
            
            <!-- 上传按钮 -->
            <button onclick="uploadPapers()" id="upload-btn" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded disabled:opacity-50">
                开始上传并分析
            </button>
            
            <!-- 进度显示 -->
            <div id="progress-container" class="mt-6 hidden">
                <div class="text-sm font-medium mb-2" id="progress-text">上传中...</div>
                <div class="w-full bg-gray-200 rounded-full h-3">
                    <div id="progress-bar" class="progress-bar bg-blue-500 h-3 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </div>
        
        <!-- 班级管理标签页 -->
        <div id="panel-classes" class="bg-white rounded-lg shadow p-6 hidden">
            <h2 class="text-xl font-semibold mb-6">🏫 班级管理</h2>
            
            <!-- 创建班级 -->
            <div class="bg-gray-50 rounded-lg p-4 mb-6">
                <h3 class="font-medium mb-3">创建新班级</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">班级名称</label>
                        <input type="text" id="new-class-name" placeholder="例如：高一(1)班" class="shadow border rounded w-full py-2 px-3">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">年级</label>
                        <select id="new-class-grade" class="shadow border rounded w-full py-2 px-3">
                            <option value="1-2">小学1-2年级</option>
                            <option value="3-4">小学3-4年级</option>
                            <option value="5-6">小学5-6年级</option>
                            <option value="7-9">初中</option>
                            <option value="10-12" selected>高中</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2">班主任</label>
                        <input type="text" id="new-class-teacher" placeholder="姓名" class="shadow border rounded w-full py-2 px-3">
                    </div>
                </div>
                <button onclick="createClass()" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-6 rounded">
                    创建班级
                </button>
            </div>
            
            <!-- 班级列表 -->
            <div>
                <h3 class="font-medium mb-3">班级列表</h3>
                <div id="class-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- 班级卡片将在这里生成 -->
                </div>
            </div>
        </div>
        
        <!-- 试卷管理标签页 -->
        <div id="panel-papers" class="bg-white rounded-lg shadow p-6 hidden">
            <h2 class="text-xl font-semibold mb-6">📋 试卷管理</h2>
            
            <div id="paper-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- 试卷卡片将在这里生成 -->
            </div>
        </div>
        
        <!-- 学情分析标签页 -->
        <div id="panel-analysis" class="bg-white rounded-lg shadow p-6 hidden">
            <h2 class="text-xl font-semibold mb-6">📊 班级学情分析</h2>
            
            <!-- 选择班级 -->
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">选择班级</label>
                <select id="analysis-class-select" class="shadow border rounded w-full md:w-64 py-2 px-3" onchange="loadClassAnalysis()">
                    <option value="">请选择班级</option>
                </select>
            </div>
            
            <!-- 分析结果 -->
            <div id="analysis-result">
                <!-- 分析结果将在这里显示 -->
            </div>
        </div>
        
        <!-- 知识图谱标签页 -->
        <div id="panel-knowledge" class="bg-white rounded-lg shadow p-6 hidden">
            <h2 class="text-xl font-semibold mb-6">🕸️ 知识点关联图谱</h2>
            
            <button onclick="loadKnowledgeGraph()" class="bg-purple-500 hover:bg-purple-700 text-white font-bold py-2 px-6 rounded mb-6">
                加载知识点图谱
            </button>
            
            <!-- 知识点统计 -->
            <div id="knowledge-stats" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
                <!-- 统计卡片将在这里生成 -->
            </div>
            
            <!-- 知识点关联 -->
            <div id="knowledge-relations" class="bg-gray-50 rounded-lg p-4">
                <h3 class="font-medium mb-3">知识点关联</h3>
                <div id="relations-list">
                    <!-- 关联关系将在这里显示 -->
                </div>
            </div>
        </div>
        
        <!-- 班级详情模态框 -->
        <div id="class-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
            <div class="bg-white rounded-lg max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 id="modal-class-name" class="text-xl font-semibold">班级详情</h2>
                        <button onclick="closeClassModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                    </div>
                    
                    <!-- 分配试卷 -->
                    <div class="mb-6">
                        <h3 class="font-medium mb-3">分配试卷</h3>
                        <div class="flex gap-2">
                            <select id="assign-paper-select" class="shadow border rounded flex-1 py-2 px-3">
                                <option value="">选择试卷</option>
                            </select>
                            <button onclick="assignPaperToClass()" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                                分配
                            </button>
                        </div>
                    </div>
                    
                    <!-- 添加学生 -->
                    <div class="mb-6">
                        <h3 class="font-medium mb-3">添加学生</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-3">
                            <input type="text" id="student-name" placeholder="学生姓名" class="shadow border rounded py-2 px-3">
                            <input type="text" id="student-number" placeholder="学号" class="shadow border rounded py-2 px-3">
                        </div>
                        <button onclick="addStudentToClass()" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">
                            添加
                        </button>
                    </div>
                    
                    <!-- 班级学情 -->
                    <div id="class-performance">
                        <!-- 班级学情将在这里显示 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = window.location.origin;
        let selectedFiles = [];
        let currentClassId = null;
        
        // ========== 标签页切换 ==========
        
        function showTab(tabName) {
            const tabs = ['upload', 'classes', 'papers', 'analysis', 'knowledge'];
            tabs.forEach(tab => {
                const panel = document.getElementById(`panel-${tab}`);
                const btn = document.getElementById(`tab-${tab}`);
                if (tab === tabName) {
                    panel.classList.remove('hidden');
                    btn.classList.add('tab-active');
                    btn.classList.remove('hover:bg-gray-100');
                } else {
                    panel.classList.add('hidden');
                    btn.classList.remove('tab-active');
                    btn.classList.add('hover:bg-gray-100');
                }
            });
            
            if (tabName === 'classes') {
                loadClasses();
            } else if (tabName === 'papers') {
                loadPapers();
            } else if (tabName === 'analysis') {
                loadClassOptions();
            }
        }
        
        // ========== 批量上传 ==========
        
        function initDragDrop() {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            
            dropZone.addEventListener('click', () => fileInput.click());
            
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });
            
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });
            
            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
            });
        }
        
        function handleFiles(files) {
            selectedFiles = [...files];
            updateFileList();
        }
        
        function updateFileList() {
            const fileList = document.getElementById('file-list');
            const selectedFilesDiv = document.getElementById('selected-files');
            
            if (selectedFiles.length === 0) {
                selectedFilesDiv.classList.add('hidden');
                return;
            }
            
            selectedFilesDiv.classList.remove('hidden');
            fileList.innerHTML = selectedFiles.map((file, index) => `
                <div class="flex justify-between items-center">
                    <span class="text-sm">${file.name} (${(file.size / 1024).toFixed(1)} KB)</span>
                    <button onclick="removeFile(${index})" class="text-red-500 hover:text-red-700 text-sm">✕</button>
                </div>
            `).join('');
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
        }
        
        async function uploadPapers() {
            if (selectedFiles.length === 0) {
                alert('请选择要上传的试卷');
                return;
            }
            
            const paperName = document.getElementById('paper-name').value || '未命名试卷';
            const grade = document.getElementById('paper-grade').value;
            
            const formData = new FormData();
            formData.append('name', paperName);
            formData.append('grade', grade);
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });
            
            document.getElementById('progress-container').classList.remove('hidden');
            document.getElementById('upload-btn').disabled = true;
            updateProgress(10, '上传中...');
            
            try {
                const response = await fetch(`${SERVER_URL}/api/library/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    updateProgress(100, '上传成功！');
                    alert('试卷上传并分析完成！');
                    selectedFiles = [];
                    updateFileList();
                } else {
                    alert('上传失败: ' + (result.error || '未知错误'));
                }
            } catch (e) {
                console.error('上传失败:', e);
                alert('上传失败，请检查网络连接');
            } finally {
                document.getElementById('upload-btn').disabled = false;
            }
        }
        
        function updateProgress(percent, text) {
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-text').textContent = text;
        }
        
        // ========== 班级管理 ==========
        
        async function loadClasses() {
            try {
                const response = await fetch(`${SERVER_URL}/api/classes`);
                const result = await response.json();
                
                if (result.success) {
                    renderClasses(result.classes);
                }
            } catch (e) {
                console.error('加载班级失败:', e);
            }
        }
        
        function renderClasses(classes) {
            const container = document.getElementById('class-list');
            
            if (!classes || classes.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">暂无班级，请先创建班级</p>';
                return;
            }
            
            container.innerHTML = classes.map(cls => `
                <div class="border rounded-lg p-4 hover:shadow-md transition-shadow cursor-pointer" onclick="openClassModal('${cls.id}')">
                    <h3 class="font-semibold text-lg mb-2">${cls.name}</h3>
                    <p class="text-sm text-gray-600 mb-1">年级: ${cls.grade}</p>
                    ${cls.teacher_name ? `<p class="text-sm text-gray-600 mb-1">班主任: ${cls.teacher_name}</p>` : ''}
                    <p class="text-sm text-gray-600">学生数: ${(cls.students || []).length}</p>
                    <p class="text-sm text-gray-600">试卷数: ${(cls.assigned_papers || []).length}</p>
                    <div class="mt-3 flex gap-2">
                        <button onclick="event.stopPropagation(); generateReport('${cls.id}')" class="text-xs bg-blue-500 text-white px-2 py-1 rounded">
                            生成报告
                        </button>
                        <button onclick="event.stopPropagation(); deleteClass('${cls.id}')" class="text-xs bg-red-500 text-white px-2 py-1 rounded">
                            删除
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        async function createClass() {
            const name = document.getElementById('new-class-name').value;
            const grade = document.getElementById('new-class-grade').value;
            const teacher = document.getElementById('new-class-teacher').value;
            
            if (!name) {
                alert('请输入班级名称');
                return;
            }
            
            try {
                const response = await fetch(`${SERVER_URL}/api/classes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, grade, teacher_name: teacher })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('班级创建成功！');
                    document.getElementById('new-class-name').value = '';
                    document.getElementById('new-class-teacher').value = '';
                    loadClasses();
                } else {
                    alert('创建失败: ' + (result.error || '未知错误'));
                }
            } catch (e) {
                console.error('创建班级失败:', e);
                alert('创建失败，请检查网络连接');
            }
        }
        
        async function deleteClass(classId) {
            if (!confirm('确定要删除这个班级吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`${SERVER_URL}/api/classes/${classId}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('班级已删除');
                    loadClasses();
                } else {
                    alert('删除失败: ' + (result.error || '未知错误'));
                }
            } catch (e) {
                console.error('删除班级失败:', e);
                alert('删除失败，请检查网络连接');
            }
        }
        
        async function openClassModal(classId) {
            currentClassId = classId;
            const cls = getClassById(classId);
            
            if (!cls) {
                return;
            }
            
            document.getElementById('modal-class-name').textContent = cls.name;
            document.getElementById('class-modal').classList.remove('hidden');
            
            await loadPaperOptions();
            await loadClassPerformance(classId);
        }
        
        function closeClassModal() {
            document.getElementById('class-modal').classList.add('hidden');
            currentClassId = null;
        }
        
        async function loadPaperOptions() {
            try {
                const response = await fetch(`${SERVER_URL}/api/library/status`);
                const result = await response.json();
                
                if (result.success && result.papers) {
                    const select = document.getElementById('assign-paper-select');
                    select.innerHTML = '<option value="">选择试卷</option>' + 
                        result.papers.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
                }
            } catch (e) {
                console.error('加载试卷选项失败:', e);
            }
        }
        
        async function assignPaperToClass() {
            const paperId = document.getElementById('assign-paper-select').value;
            
            if (!paperId) {
                alert('请选择要分配的试卷');
                return;
            }
            
            try {
                const response = await fetch(`${SERVER_URL}/api/classes/${currentClassId}/papers`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paper_id: paperId })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('试卷分配成功！');
                    loadClassPerformance(currentClassId);
                } else {
                    alert('分配失败: ' + (result.error || '未知错误'));
                }
            } catch (e) {
                console.error('分配试卷失败:', e);
                alert('分配失败，请检查网络连接');
            }
        }
        
        async function addStudentToClass() {
            const name = document.getElementById('student-name').value;
            const number = document.getElementById('student-number').value;
            
            if (!name) {
                alert('请输入学生姓名');
                return;
            }
            
            try {
                const response = await fetch(`${SERVER_URL}/api/classes/${currentClassId}/students`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student: { name, number } })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('学生添加成功！');
                    document.getElementById('student-name').value = '';
                    document.getElementById('student-number').value = '';
                } else {
                    alert('添加失败: ' + (result.error || '未知错误'));
                }
            } catch (e) {
                console.error('添加学生失败:', e);
                alert('添加失败，请检查网络连接');
            }
        }
        
        async function loadClassPerformance(classId) {
            try {
                const response = await fetch(`${SERVER_URL}/api/classes/${classId}/performance`);
                const result = await response.json();
                
                if (result.success) {
                    renderClassPerformance(result);
                }
            } catch (e) {
                console.error('加载班级学情失败:', e);
            }
        }
        
        function renderClassPerformance(data) {
            const container = document.getElementById('class-performance');
            
            if (!data || data.total_questions === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-4">暂无学情数据，请先分配试卷</p>';
                return;
            }
            
            let html = `
                <h3 class="font-medium mb-4">班级学情分析</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-blue-50 rounded-lg p-4 text-center">
                        <div class="text-2xl font-bold text-blue-700">${data.total_questions}</div>
                        <div class="text-sm text-gray-600">总题目数</div>
                    </div>
                    <div class="bg-green-50 rounded-lg p-4 text-center">
                        <div class="text-2xl font-bold text-green-700">${data.correct_count}</div>
                        <div class="text-sm text-gray-600">正确数</div>
                    </div>
                    <div class="bg-purple-50 rounded-lg p-4 text-center">
                        <div class="text-2xl font-bold text-purple-700">${data.overall_accuracy.toFixed(1)}%</div>
                        <div class="text-sm text-gray-600">正确率</div>
                    </div>
                </div>
            `;
            
            if (data.knowledge_mastery && data.knowledge_mastery.length > 0) {
                html += `
                    <div class="mb-6">
                        <h4 class="font-medium mb-3">知识点掌握情况</h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            ${data.knowledge_mastery.map(kp => `
                                <div class="border rounded p-3">
                                    <div class="flex justify-between mb-1">
                                        <span class="text-sm font-medium">${kp.knowledge_point}</span>
                                        <span class="text-sm ${kp.mastery_rate >= 70 ? 'text-green-600' : kp.mastery_rate >= 40 ? 'text-yellow-600' : 'text-red-600'}">
                                            ${kp.mastery_rate.toFixed(1)}%
                                        </span>
                                    </div>
                                    <div class="w-full bg-gray-200 rounded-full h-2">
                                        <div class="h-2 rounded-full ${kp.mastery_rate >= 70 ? 'bg-green-500' : kp.mastery_rate >= 40 ? 'bg-yellow-500' : 'bg-red-500'}" style="width: ${kp.mastery_rate}%"></div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            if (data.teaching_suggestions && data.teaching_suggestions.length > 0) {
                html += `
                    <div>
                        <h4 class="font-medium mb-3">📋 教学建议</h4>
                        <div class="space-y-2">
                            ${data.teaching_suggestions.map(s => `
                                <div class="border-l-4 ${s.priority === 'high' ? 'border-red-500 bg-red-50' : s.priority === 'medium' ? 'border-yellow-500 bg-yellow-50' : 'border-green-500 bg-green-50'} pl-4 py-2">
                                    <div class="font-medium">${s.category}</div>
                                    <div class="text-sm text-gray-700">${s.suggestion}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        async function generateReport(classId) {
            try {
                const response = await fetch(`${SERVER_URL}/api/classes/${classId}/report`, {
                    method: 'POST'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('报告生成成功！');
                } else {
                    alert('生成报告失败: ' + (result.error || '未知错误'));
                }
            } catch (e) {
                console.error('生成报告失败:', e);
                alert('生成失败，请检查网络连接');
            }
        }
        
        function getClassById(classId) {
            const classes = loadClassesFromCache();
            return classes.find(c => c.id === classId);
        }
        
        function loadClassesFromCache() {
            return [];
        }
        
        // ========== 试卷管理 ==========
        
        async function loadPapers() {
            try {
                const response = await fetch(`${SERVER_URL}/api/library/status`);
                const result = await response.json();
                
                if (result.success) {
                    renderPapers(result.papers);
                }
            } catch (e) {
                console.error('加载试卷失败:', e);
            }
        }
        
        function renderPapers(papers) {
            const container = document.getElementById('paper-list');
            
            if (!papers || papers.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">暂无试卷，请先上传</p>';
                return;
            }
            
            container.innerHTML = papers.map(paper => `
                <div class="border rounded-lg p-4 hover:shadow-md transition-shadow">
                    <h3 class="font-semibold mb-2">${paper.name}</h3>
                    <p class="text-sm text-gray-600 mb-1">年级: ${paper.grade || '未设置'}</p>
                    <p class="text-sm text-gray-600 mb-2">上传时间: ${new Date(paper.upload_time).toLocaleString('zh-CN')}</p>
                    <div class="flex gap-2">
                        <span class="text-xs px-2 py-1 rounded ${paper.status === 'completed' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">
                            ${paper.status === 'completed' ? '✓ 已分析' : '⏳ 分析中'}
                        </span>
                    </div>
                    ${paper.total_questions ? `
                        <div class="mt-3 text-sm text-gray-600">
                            共 ${paper.total_questions} 题
                            ${paper.correct_count !== undefined ? `，正确率 ${((paper.correct_count / paper.total_questions) * 100).toFixed(1)}%` : ''}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }
        
        // ========== 学情分析 ==========
        
        async function loadClassOptions() {
            try {
                const response = await fetch(`${SERVER_URL}/api/classes`);
                const result = await response.json();
                
                if (result.success) {
                    const select = document.getElementById('analysis-class-select');
                    select.innerHTML = '<option value="">请选择班级</option>' + 
                        result.classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                }
            } catch (e) {
                console.error('加载班级选项失败:', e);
            }
        }
        
        async function loadClassAnalysis() {
            const classId = document.getElementById('analysis-class-select').value;
            
            if (!classId) {
                return;
            }
            
            try {
                const response = await fetch(`${SERVER_URL}/api/classes/${classId}/performance`);
                const result = await response.json();
                
                if (result.success) {
                    renderClassAnalysis(result);
                }
            } catch (e) {
                console.error('加载学情分析失败:', e);
            }
        }
        
        function renderClassAnalysis(data) {
            const container = document.getElementById('analysis-result');
            
            if (!data || data.total_questions === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">暂无分析数据</p>';
                return;
            }
            
            let html = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-blue-50 rounded-lg p-4 text-center">
                        <div class="text-2xl font-bold text-blue-700">${data.total_questions}</div>
                        <div class="text-sm text-gray-600">总题目数</div>
                    </div>
                    <div class="bg-green-50 rounded-lg p-4 text-center">
                        <div class="text-2xl font-bold text-green-700">${data.correct_count}</div>
                        <div class="text-sm text-gray-600">正确数</div>
                    </div>
                    <div class="bg-purple-50 rounded-lg p-4 text-center">
                        <div class="text-2xl font-bold text-purple-700">${data.overall_accuracy.toFixed(1)}%</div>
                        <div class="text-sm text-gray-600">正确率</div>
                    </div>
                </div>
            `;
            
            if (data.knowledge_mastery && data.knowledge_mastery.length > 0) {
                html += `
                    <div class="mb-6">
                        <h3 class="font-medium mb-3">📚 知识点掌握</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            ${data.knowledge_mastery.map(kp => `
                                <div class="border rounded p-3">
                                    <div class="flex justify-between mb-1">
                                        <span class="text-sm font-medium">${kp.knowledge_point}</span>
                                        <span class="text-sm ${kp.mastery_rate >= 70 ? 'text-green-600' : kp.mastery_rate >= 40 ? 'text-yellow-600' : 'text-red-600'}">
                                            ${kp.mastery_rate.toFixed(1)}%
                                        </span>
                                    </div>
                                    <div class="w-full bg-gray-200 rounded-full h-2">
                                        <div class="h-2 rounded-full ${kp.mastery_rate >= 70 ? 'bg-green-500' : kp.mastery_rate >= 40 ? 'bg-yellow-500' : 'bg-red-500'}" style="width: ${kp.mastery_rate}%"></div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            if (data.teaching_suggestions && data.teaching_suggestions.length > 0) {
                html += `
                    <div>
                        <h3 class="font-medium mb-3">💡 教学建议</h3>
                        <div class="space-y-2">
                            ${data.teaching_suggestions.map(s => `
                                <div class="border-l-4 ${s.priority === 'high' ? 'border-red-500 bg-red-50' : s.priority === 'medium' ? 'border-yellow-500 bg-yellow-50' : 'border-green-500 bg-green-50'} pl-4 py-2">
                                    <div class="font-medium">${s.category}</div>
                                    <div class="text-sm text-gray-700">${s.suggestion}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        // ========== 知识图谱 ==========
        
        async function loadKnowledgeGraph() {
            try {
                const response = await fetch(`${SERVER_URL}/api/library/knowledge_graph`);
                const result = await response.json();
                
                if (result.success) {
                    renderKnowledgeGraph(result.graph);
                }
            } catch (e) {
                console.error('加载知识图谱失败:', e);
            }
        }
        
        function renderKnowledgeGraph(graph) {
            const statsContainer = document.getElementById('knowledge-stats');
            const relationsContainer = document.getElementById('relations-list');
            
            if (!graph) {
                statsContainer.innerHTML = '<p class="text-gray-500 text-center py-8">暂无数据</p>';
                return;
            }
            
            if (graph.statistics && graph.statistics.length > 0) {
                statsContainer.innerHTML = graph.statistics.map(stat => `
                    <div class="border rounded-lg p-4">
                        <div class="font-semibold mb-2">${stat.name}</div>
                        <div class="text-sm text-gray-600 mb-1">出现次数: ${stat.appearanceCount || 0}</div>
                        <div class="flex items-center justify-between">
                            <span class="text-sm">掌握率</span>
                            <span class="text-sm font-medium ${(stat.masteryRate || 0) >= 70 ? 'text-green-600' : (stat.masteryRate || 0) >= 40 ? 'text-yellow-600' : 'text-red-600'}">
                                ${(stat.masteryRate || 0).toFixed(1)}%
                            </span>
                        </div>
                    </div>
                `).join('');
            }
            
            if (graph.edges && graph.edges.length > 0) {
                relationsContainer.innerHTML = `
                    <p class="text-sm text-gray-600 mb-3">共 ${graph.edges.length} 个知识点关联</p>
                    <div class="space-y-2">
                        ${graph.edges.slice(0, 20).map(edge => `
                            <div class="flex items-center gap-2 p-2 bg-white rounded">
                                <span class="px-2 py-1 bg-blue-100 text-blue-800 rounded text-sm">${edge.source}</span>
                                <span class="text-gray-400">→</span>
                                <span class="px-2 py-1 bg-green-100 text-green-800 rounded text-sm">${edge.target}</span>
                                <span class="text-xs text-gray-500 ml-auto">共 ${edge.weight} 次</span>
                            </div>
                        `).join('')}
                        ${graph.edges.length > 20 ? `<p class="text-sm text-gray-500 text-center mt-2">... 还有 ${graph.edges.length - 20} 个关联</p>` : ''}
                    </div>
                `;
            }
        }
        
        // ========== 初始化 ==========
        
        document.addEventListener('DOMContentLoaded', () => {
            initDragDrop();
        });
        
        // 点击模态框外部关闭
        document.getElementById('class-modal').addEventListener('click', (e) => {
            if (e.target.id === 'class-modal') {
                closeClassModal();
            }
        });
    </script>
</body>
</html>
